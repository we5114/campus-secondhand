version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: campus-secondhand-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: campus_secondhand
      MYSQL_USER: campus
      MYSQL_PASSWORD: campus123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - campus-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: campus-secondhand-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - campus-network
    command: redis-server --appendonly yes --requirepass redis123456
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5

  # Elasticsearch搜索引擎
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: campus-secondhand-es
    restart: always
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - TZ=Asia/Shanghai
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - campus-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      timeout: 10s
      retries: 10

  # Kafka消息队列
  kafka:
    image: bitnami/kafka:3.6
    container_name: campus-secondhand-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - TZ=Asia/Shanghai
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - campus-network

  # 后端API服务
  backend:
    build:
      context: ../
      dockerfile: docker/backend/Dockerfile
    container_name: campus-secondhand-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - DATABASE_URL=mysql+pymysql://campus:campus123456@mysql:3306/campus_secondhand?charset=utf8mb4
      - REDIS_URL=redis://:redis123456@redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SECRET_KEY=campus-secondhand-secret-key-2024
      - TZ=Asia/Shanghai
    volumes:
      - ../api:/app
      - upload_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - campus-network

  # 前端Web服务
  frontend:
    build:
      context: ../
      dockerfile: docker/frontend/Dockerfile
    container_name: campus-secondhand-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - campus-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: campus-secondhand-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - upload_data:/usr/share/nginx/html/uploads
    depends_on:
      - backend
      - frontend
    networks:
      - campus-network

volumes:
  mysql_data:
  redis_data:
  es_data:
  kafka_data:
  upload_data:

networks:
  campus-network:
    driver: bridge
